<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SKIT Student Registration Form</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body{
    background:linear-gradient(135deg,#0f4c81,#4facfe,#00c6fb);
    background-size:cover;
    min-height:100vh;
}

/* Heading */

.header{
    text-align:center;
    padding:30px 15px;
    color:white;
}

.logo{
    width:90px;
    height:90px;
    background:white;
    border-radius:50%;
    margin:auto;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:40px;
    box-shadow:0 8px 20px rgba(0,0,0,.3);
}

.header h1{
    margin-top:15px;
    font-size:38px;
}

.header p{
    margin-top:8px;
    font-size:18px;
}

/* Form */

.container{
    width:500px;
    max-width:92%;
    margin:20px auto 40px;
    padding:35px;
    background:rgba(255,255,255,.18);
    backdrop-filter:blur(12px);
    border-radius:20px;
    border:1px solid rgba(255,255,255,.4);
    box-shadow:0 15px 35px rgba(0,0,0,.25);
}

.container h2{
    text-align:center;
    color:white;
    margin-bottom:25px;
    font-size:28px;
}

label{
    display:block;
    color:white;
    margin-top:15px;
    margin-bottom:6px;
    font-weight:bold;
}

input,
select,
textarea{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    font-size:15px;
    outline:none;
    transition:.3s;
}

input:focus,
select:focus,
textarea:focus{
    transform:scale(1.02);
    box-shadow:0 0 10px #ffffff;
}

.gender{
    color:white;
    margin-top:10px;
}

.gender label{
    display:inline;
    margin-right:20px;
    font-weight:normal;
}

.gender input{
    width:auto;
    margin-right:5px;
}

button{
    width:100%;
    margin-top:25px;
    padding:14px;
    background:#ff9800;
    color:white;
    border:none;
    border-radius:30px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#ff6f00;
    transform:translateY(-3px);
    box-shadow:0 8px 15px rgba(0,0,0,.3);
}

footer{
    text-align:center;
    color:white;
    padding:20px;
    font-size:15px;
}

@media(max-width:600px){

.header h1{
    font-size:28px;
}

.container{
    padding:25px;
}

}

</style>

</head>

<body>

<div class="header">

<div class="logo">🎓</div>

<h1>SKIT Admission Portal</h1>

<p>Swami Keshvanand Institute of Technology, Management & Gramothan</p>

</div>

<div class="container">

<h2>Student Registration Form</h2>

<form>

<label>👤 Full Name</label>
<input type="text" placeholder="Enter Full Name" required>

<label>📧 Email Address</label>
<input type="email" placeholder="Enter Email" required>

<label>📱 Phone Number</label>
<input type="tel" placeholder="Enter Phone Number" required>

<label>🎂 Date of Birth</label>
<input type="date" required>

<label>🎓 Select Course</label>

<select required>
<option value="">Choose Course</option>
<option>B.Tech</option>
<option>BCA</option>
<option>BBA</option>
<option>B.Com</option>
<option>MCA</option>
</select>

<label>⚧ Gender</label>

<div class="gender">

<label><input type="radio" name="gender"> Male</label>

<label><input type="radio" name="gender"> Female</label>

<label><input type="radio" name="gender"> Other</label>

</div>

<label>🏠 Address</label>

<textarea rows="4" placeholder="Enter Your Address"></textarea>

<label>🔒 Password</label>

<input type="password" placeholder="Enter Password" required>

<label>🔑 Confirm Password</label>

<input type="password" placeholder="Confirm Password" required>

<button type="submit">Register Now</button>

</form>

</div>

<footer>

© 2026 SKIT | Swami Keshvanand Institute of Technology, Management & Gramothan <br><br>

Designed with ❤️ for Student Admissions

</footer>

</body>
</html>
