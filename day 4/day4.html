<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Srishti Boutique | Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#E9D5FF,#D8B4FE,#C084FC);
min-height:100vh;
transition:.4s;
}

/* Header */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 8%;
background:rgba(255,255,255,.85);
backdrop-filter:blur(12px);
box-shadow:0 5px 15px rgba(0,0,0,.12);
position:sticky;
top:0;
z-index:100;
transition:.4s;
}

.logo{
font-size:32px;
font-weight:700;
color:#8B5CF6;
}

.logo span{
color:#EC4899;
}

nav a{
text-decoration:none;
color:#444;
margin-left:25px;
font-weight:500;
transition:.3s;
}

nav a:hover{
color:#8B5CF6;
}

#themeBtn{
padding:10px 20px;
background:#8B5CF6;
border:none;
border-radius:30px;
color:white;
cursor:pointer;
font-size:15px;
font-weight:600;
transition:.3s;
}

#themeBtn:hover{
background:#7C3AED;
transform:scale(1.05);
}

/* Login Card */

.container{
width:430px;
max-width:90%;
margin:70px auto;
background:rgba(255,255,255,.25);
backdrop-filter:blur(18px);
padding:35px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.2);
transition:.4s;
}

.container h2{
text-align:center;
color:#6D28D9;
margin-bottom:10px;
font-size:30px;
}

.subtitle{
text-align:center;
color:#555;
margin-bottom:25px;
font-size:14px;
}

label{
display:block;
margin-top:18px;
font-weight:600;
color:#333;
}

input{
width:100%;
padding:13px;
margin-top:8px;
border:none;
border-radius:10px;
font-size:15px;
background:white;
outline:none;
transition:.3s;
}

input:focus{
box-shadow:0 0 10px #C084FC;
transform:scale(1.02);
}

.options{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:18px;
font-size:14px;
}

.options a{
text-decoration:none;
color:#7C3AED;
font-weight:500;
}

.login-btn{
width:100%;
padding:14px;
margin-top:28px;
background:linear-gradient(135deg,#8B5CF6,#EC4899);
border:none;
border-radius:30px;
font-size:17px;
font-weight:bold;
color:white;
cursor:pointer;
transition:.3s;
}

.login-btn:hover{
transform:translateY(-4px);
box-shadow:0 10px 20px rgba(0,0,0,.25);
}

.signup{
text-align:center;
margin-top:20px;
}

.signup a{
text-decoration:none;
color:#7C3AED;
font-weight:600;
}

.social{
display:flex;
justify-content:center;
gap:15px;
margin-top:25px;
}

.social a{
width:45px;
height:45px;
display:flex;
justify-content:center;
align-items:center;
background:white;
border-radius:50%;
text-decoration:none;
font-size:20px;
transition:.3s;
}

.social a:hover{
transform:translateY(-5px);
background:#8B5CF6;
color:white;
}

/* Footer */

footer{
text-align:center;
padding:20px;
background:rgba(255,255,255,.8);
margin-top:50px;
color:#555;
transition:.4s;
}

/* Dark Mode */

.dark{
background:linear-gradient(135deg,#111827,#1F2937,#312E81);
}

.dark header{
background:rgba(30,30,30,.95);
}

.dark nav a{
color:white;
}

.dark .container{
background:rgba(40,40,40,.65);
color:white;
}

.dark .container h2,
.dark label{
color:white;
}

.dark .subtitle{
color:#ddd;
}

.dark input{
background:#444;
color:white;
}

.dark input::placeholder{
color:#ccc;
}

.dark footer{
background:#1F2937;
color:white;
}

.dark .social a{
background:#333;
color:white;
}

.dark .social a:hover{
background:#8B5CF6;
}

@media(max-width:768px){

header{
flex-direction:column;
gap:15px;
}

nav{
display:flex;
flex-wrap:wrap;
justify-content:center;
}

nav a{
margin:10px;
}

}

</style>
</head>

<body>

<header>

<div class="logo">🧶 Srishti <span>Boutique</span></div>

<nav>
<a href="#">Home</a>
<a href="#">Collections</a>
<a href="#">Crochet</a>
<a href="#">About</a>
<a href="#">Contact</a>
</nav>

<button id="themeBtn">🌙 Dark Mode</button>

</header>

<div class="container">

<h2>Welcome Back</h2>

<p class="subtitle">
Login to explore our beautiful handmade crochet collection.
</p>

<form>

<label>Email Address</label>
<input type="email" placeholder="Enter your email" required>

<label>Password</label>
<input type="password" placeholder="Enter your password" required>

<div class="options">

<label>
<input type="checkbox" style="width:auto;">
 Remember Me
</label>

<a href="#">Forgot Password?</a>

</div>

<button class="login-btn" type="submit">
Login
</button>

<div class="signup">

<p>
Don't have an account?
<a href="#">Create Account</a>
</p>

</div>

<div class="social">

<a href="#">📘</a>
<a href="#">📸</a>
<a href="#">🛍️</a>

</div>

</form>

</div><footer>
    <p>© 2026 <strong>Srishti Boutique</strong> | Handmade with ❤️ | All Rights Reserved</p>
</footer>

<script>

// Dark / Light Mode Toggle

const themeBtn = document.getElementById("themeBtn");

themeBtn.addEventListener("click", function () {

    document.body.classList.toggle("dark");

    if (document.body.classList.contains("dark")) {

        themeBtn.innerHTML = "☀️ Light Mode";

    } else {

        themeBtn.innerHTML = "🌙 Dark Mode";

    }

});

</script>

</body>
</html>
